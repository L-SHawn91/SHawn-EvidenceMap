name: Bug report
description: Report a reproducible public-safe issue
title: "[bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? Do not include private data, credentials, PDFs, or local paths.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Use public metadata or toy examples only.
    validations:
      required: true
