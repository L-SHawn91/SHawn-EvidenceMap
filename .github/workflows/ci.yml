name: Public CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest -q

      - name: Run public-safety scan
        run: python scripts/public_safety_scan.py .

      - name: Compile Python sources
        run: python -m compileall -q src

      - name: Build wheel
        run: python -m pip wheel . --no-deps -w dist

      - name: Verify CLI entry point
        run: evidencemap --help

      - name: Verify blind-onboarding safety
        run: |
          python - <<'PY'
          from evidencemap.cli import build_parser
          args = build_parser().parse_args(["open science metadata reproducibility"])
          assert args.cartridge == "generic"
          print("GENERIC_DEFAULT_OK")
          PY
          rm -f build/does-not-exist.sqlite3
          if python -m evidencemap.refdb verify --db build/does-not-exist.sqlite3; then
            echo "missing database was incorrectly accepted" >&2
            exit 1
          fi
          test ! -e build/does-not-exist.sqlite3

      - name: Build and verify SQLite reference demo
        run: |
          mkdir -p build/reference-demo
          python -m evidencemap.refdb demo --db build/reference-demo/demo-a.sqlite3
          python -m evidencemap.refdb verify --db build/reference-demo/demo-a.sqlite3
          python -m evidencemap.refdb export --db build/reference-demo/demo-a.sqlite3 --out build/reference-demo/demo-a.json
          python -m evidencemap.refdb page --db build/reference-demo/demo-a.sqlite3 --out build/reference-demo/index.html
          python -m evidencemap.refdb demo --db build/reference-demo/demo-b.sqlite3
          python -m evidencemap.refdb export --db build/reference-demo/demo-b.sqlite3 --out build/reference-demo/demo-b.json
          cmp build/reference-demo/demo-a.json build/reference-demo/demo-b.json
          cmp build/reference-demo/demo-a.json web/db-demo/reference.json
          cmp build/reference-demo/index.html web/db-demo/index.html

      - name: Build and verify public metadata pilot demo
        run: |
          mkdir -p build/public-metadata-demo
          python -m evidencemap.refdb public-demo --db build/public-metadata-demo/demo-a.sqlite3
          python -m evidencemap.refdb verify --db build/public-metadata-demo/demo-a.sqlite3
          python -m evidencemap.refdb export --db build/public-metadata-demo/demo-a.sqlite3 --out build/public-metadata-demo/demo-a.json
          python -m evidencemap.refdb page --db build/public-metadata-demo/demo-a.sqlite3 --out build/public-metadata-demo/index.html
          python -m evidencemap.refdb public-demo --db build/public-metadata-demo/demo-b.sqlite3
          python -m evidencemap.refdb export --db build/public-metadata-demo/demo-b.sqlite3 --out build/public-metadata-demo/demo-b.json
          cmp build/public-metadata-demo/demo-a.json build/public-metadata-demo/demo-b.json
          cmp build/public-metadata-demo/demo-a.json web/public-metadata-demo/reference.json
          cmp build/public-metadata-demo/index.html web/public-metadata-demo/index.html

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: shawn-evidencemap-wheel
          path: dist/*.whl
          if-no-files-found: error

      - name: Upload SQLite reference demo artifact
        uses: actions/upload-artifact@v7
        with:
          name: evidencemap-synthetic-sqlite-reference
          path: |
            build/reference-demo/demo-a.sqlite3
            build/reference-demo/demo-a.json
            build/reference-demo/index.html
          if-no-files-found: error

      - name: Upload public metadata pilot artifact
        uses: actions/upload-artifact@v7
        with:
          name: evidencemap-public-metadata-reference
          path: |
            build/public-metadata-demo/demo-a.sqlite3
            build/public-metadata-demo/demo-a.json
            build/public-metadata-demo/index.html
          if-no-files-found: error
